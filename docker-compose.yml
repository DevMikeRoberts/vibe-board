services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    volumes:
      # Live-reload: mount server source (tsx watch picks up changes)
      - ./packages/server/src:/app/packages/server/src
      # Persist SQLite database across container restarts
      - ./packages/server/data:/app/packages/server/data
      # Shared types (live changes)
      - ./shared:/app/shared
      # Mount host projects so agents can read/write files
      - ${PROJECTS_DIR:-~/projects}:/host-projects
      # --- Agent CLI binaries ---
      # Claude Code native binary (bind-mount from host)
      - /usr/local/bin/claude:/usr/local/bin/claude:ro
      # Codex CLI (mount package + create proper symlink so __dirname resolves vendor/)
      - /usr/lib/node_modules/@openai/codex:/usr/lib/node_modules/@openai/codex:ro
      # --- Agent auth credentials ---
      # GitHub auth for Copilot SDK
      - ~/.config/github-copilot:/root/.config/github-copilot:ro
      - ~/.config/gh:/root/.config/gh:ro
      # Claude Code auth + debug logs (rw needed for SDK debug writes)
      - ~/.claude:/root/.claude
      # Codex (OpenAI) auth + skills (rw needed for skills loader)
      - ~/.codex:/root/.codex
    environment:
      - PORT=3001
      - NODE_ENV=development
      # Tell the server where host projects are mounted inside the container
      - ALLOWED_REPO_ROOTS=/host-projects,/tmp
      - ALLOWED_ORIGINS=http://localhost:4175,http://localhost:4176
      # Agent models (override if needed)
      - COPILOT_MODEL=${COPILOT_MODEL:-claude-opus-4-20250514}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-opus-4-20250514}
      - CODEX_MODEL=${CODEX_MODEL:-gpt-5.2-codex}
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "4175:4175"
    volumes:
      # Live-reload: mount client source (Vite HMR picks up changes)
      - ./packages/client/src:/app/packages/client/src
      # Mount vite config and tailwind so config changes are live too
      - ./packages/client/vite.config.ts:/app/packages/client/vite.config.ts
      - ./packages/client/index.html:/app/packages/client/index.html
      # Shared types (live changes)
      - ./shared:/app/shared
    environment:
      - NODE_ENV=development
      # Proxy API/WS requests to the server container
      - API_URL=http://server:3001
    depends_on:
      - server
    restart: unless-stopped
